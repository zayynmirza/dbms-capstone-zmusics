<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZMusics</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
    <script src="schema.js"></script>
    <script src="database.js"></script>
</head>
<body class="dark-theme">
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <h1>Z<span>Musics</span></h1>
            </div>
            <nav class="nav-menu">
                <ul>
                    <li class="active" id="li-home"><a href="#" id="nav-home">Home</a></li>
                    <li id="li-favorites"><a href="#" id="nav-favorites">Favorites</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <div class="search-bar">
                    <input type="text" id="song-search" placeholder="Search songs, artists, albums...">
                </div>
                <div class="user-profile">
                    <span class="user-name">Local User</span>
                </div>
            </header>

            <section class="view-section">
                <h2 class="section-title" id="view-title">Home</h2>
                <div class="songs-grid" id="songs-grid"></div>
            </section>
        </main>

        <footer class="player-bar">
            <div class="current-track-info">
                <div class="track-cover" id="player-cover"></div>
                <div class="track-details">
                    <div class="track-title" id="player-title">No song playing</div>
                    <div class="track-artist" id="player-artist">-</div>
                </div>
            </div>

            <div class="player-controls">
                <div class="control-buttons">
                    <button id="prev-btn" class="icon-btn">⏮</button>
                    <button id="play-pause-btn" class="icon-btn play-btn">▶</button>
                    <button id="next-btn" class="icon-btn">⏭</button>
                </div>
                <div class="progress-container">
                    <span id="current-time">0:00</span>
                    <input type="range" id="progress-slider" min="0" max="100" value="0">
                    <span id="total-time">0:00</span>
                </div>
            </div>

            <div class="player-right">
                <button id="player-like-btn" class="icon-btn heart-btn">❤</button>
                <div class="volume-controls">
                    <span class="vol-icon">🔊</span>
                    <input type="range" id="volume-slider" min="0" max="100" value="80">
                </div>
            </div>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
